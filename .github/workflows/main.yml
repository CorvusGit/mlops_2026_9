name: CI/CD

on:
  push:
    branches:
      - main

env:
  YC_S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
  YC_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
  YC_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
  YC_S3_ENDPOINT: ${{ secrets.S3_ENDPOINT_URL }}
  YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      dags: ${{ steps.filter.outputs.dags }}
      src: ${{ steps.filter.outputs.src }}
      model: ${{ steps.filter.outputs.model }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            dags: ['dags/**']
            src: ['src/**']
            model: ['restapi/**']

  # Ваши существующие задачи для Airflow
  sync-dags:
    needs: changes
    if: ${{ needs.changes.outputs.dags == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: jakejarvis/s3-sync-action@master
        with:
          args: --delete
        env:
          AWS_S3_BUCKET: ${{ env.YC_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ env.YC_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.YC_S3_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: ${{ env.YC_S3_ENDPOINT }}
          SOURCE_DIR: 'dags'
          DEST_DIR: 'dags'

  upload-src:
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: jakejarvis/s3-sync-action@master
        with:
          args: --delete
        env:
          AWS_S3_BUCKET: ${{ env.YC_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ env.YC_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.YC_S3_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: ${{ env.YC_S3_ENDPOINT }}
          SOURCE_DIR: 'src'
          DEST_DIR: 'src'

  # REST API
  build-and-deploy-model:
    needs: changes
    if: ${{ needs.changes.outputs.model == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      # Тесты  
      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Run Tests
        run: |
          pip install pytest pandas numpy pydantic loguru mlflow pyspark fastapi mlflow aiokafka
          export PYTHONPATH=$PYTHONPATH:$(pwd)/restapi
          pytest restapi/tests/
      
      # Deploy
      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://yandexcloud.net | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Authenticate with Yandex Cloud
        run: |
          # Создаем временный файл с ключом из секретов
          echo '${{ secrets.YC_SA_JSON_KEY }}' > sa-key.json
          
          # Авторизация
          yc config set service-account-key sa-key.json
          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
          
          # Настройка docker-логина через yc
          yc container registry configure-docker

      - name: Build and Push Image
        run: |
          IMAGE_PATH=cr.yandex/${{ env.YC_REGISTRY_ID }}/fraud-api:${{ github.sha }}
          yc container registry configure-docker
          docker build -t $IMAGE_PATH -f restapi/Dockerfile restapi/
          docker push $IMAGE_PATH

      - name: Prepare and Upload K8s Manifests to S3
        run: |
          IMAGE_PATH=cr.yandex/${{ env.YC_REGISTRY_ID }}/fraud-api:${{ github.sha }}
          MLFLOW_URL="http://${{ secrets.MLFLOW_IP }}:${{ secrets.MLFLOW_PORT }}"
          KAFKA_URL = "${{ secrets.KAFKA_FQDN }}:${{ secrets.KAFKA_PORT }}"

          # Заменяем образ, адрес MLFlow и адрес Kafka в шаблоне
          sed -e "s|{{IMAGE_PLACEHOLDER}}|$IMAGE_PATH|g" \
              -e "s|{{MLFLOW_URL}}|$MLFLOW_URL|g" \
              -e "s|{{KAFKA_URL}}|$KAFKA_URL|g" \
              -e "s|{{KAFKA_USER}}|${{ secrets.KAFKA_USER }}|g" \
              -e "s|{{KAFKA_PASS}}|${{ secrets.KAFKA_PASS }}|g" \
              restapi/k8s/deployment-template.yaml > deployment.yaml
          
          # Загружаем готовый файл в S3
          aws s3 cp deployment.yaml s3://${{ env.YC_S3_BUCKET }}/k8s/deployment.yaml --endpoint-url ${{ env.YC_S3_ENDPOINT }}
          aws s3 cp restapi/k8s/service.yaml s3://${{ env.YC_S3_BUCKET }}/k8s/service.yaml --endpoint-url ${{ env.YC_S3_ENDPOINT }}
        env:
          AWS_ACCESS_KEY_ID: ${{ env.YC_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.YC_S3_SECRET_ACCESS_KEY }}
