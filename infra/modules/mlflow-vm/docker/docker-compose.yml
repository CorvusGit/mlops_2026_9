version: "3.9"

services:
  postgres:
    build: ./postgres_docker
    container_name: mlflow-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AWS_ACCESS_KEY_ID: ${YC_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${YC_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5455:5432"
    command: >
      /bin/sh -c "

        MARKER=/var/lib/postgresql/data/.restore_complete
        
        # 1. Если маркер есть — просто запускаем базу и выходим из скрипта
        if [ -f \"$$MARKER\" ]; then
          echo 'База уже была проверена ранее. Запуск...';
          exec docker-entrypoint.sh postgres;
        fi;

        # 2. Запуск в фоне
        docker-entrypoint.sh postgres &
        until pg_isready -h localhost -U $$POSTGRES_USER; do sleep 2; done;

        echo 'Анализ данных в базе...';
        TAB_EXISTS=$$(psql -h localhost -U $$POSTGRES_USER -d $$POSTGRES_DB -tAc \"SELECT 1 FROM pg_tables WHERE tablename='experiments'\");
        if [ \"$$TAB_EXISTS\" = \"1\" ]; then
          COUNT=$$(psql -h localhost -U $$POSTGRES_USER -d $$POSTGRES_DB -tAc \"SELECT count(*) FROM experiments\");
        else
          COUNT=0;
        fi;

        echo \"Найдено экспериментов: $$COUNT\";

        # 3. Восстановление
        if [ \"$$COUNT\" -le 1 ]; then
          echo 'База пуста или только Default. Начинаем восстановление...';
          if aws --endpoint-url=https://storage.yandexcloud.net s3 cp s3://$$S3_BUCKET/backups/mlflow_table.sql.gz /tmp/backup.gz; then
            echo 'Очистка и заливка данных...';
            # Важно: выполняем всё одной цепочкой через &&
            psql -h localhost -U $$POSTGRES_USER -d $$POSTGRES_DB -c \"DROP SCHEMA public CASCADE; CREATE SCHEMA public;\" && \
            gunzip -c /tmp/backup.gz | psql -h localhost -U $$POSTGRES_USER -d $$POSTGRES_DB && \
            echo 'Восстановление успешно завершено.' && \
            rm /tmp/backup.gz;
          fi;
        fi;
        
        # Создаем маркер, чтобы при следующем рестарте скрипт не выполнялся
        touch \"$$MARKER\";

        # 4. КОРРЕКТНОЕ ЗАВЕРШЕНИЕ
        echo "Перезапуск сервера...";
        su postgres -c "pg_ctl stop -m fast -w" || pkill -9 postgres;
        rm -f /var/lib/postgresql/data/postmaster.pid;
        sleep 1;
        echo "Запуск контейнера";
        exec docker-entrypoint.sh postgres
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  mlflow:
    build: ./mlflow_docker
    container_name: mlflow
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5005:5005"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AWS_ACCESS_KEY_ID: ${YC_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${YC_SECRET_KEY}
      MLFLOW_S3_ENDPOINT_URL: https://storage.yandexcloud.net
    command: >
      /bin/sh -c "
          echo 'Pausing 60 seconds for Postgres recovery/init...'
          sleep 60

          echo 'Starting MLflow server...'
          mlflow server --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB} --artifacts-destination s3://${S3_BUCKET}/artifacts --host 0.0.0.0 --port 5005 --allowed-hosts '*'
        "

  backup:
    build: ./postgres_docker
    container_name: mlflow-backup
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      S3_BUCKET: ${S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${YC_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${YC_SECRET_KEY}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL}
    entrypoint: >
      /bin/sh -c "
        export PGPASSWORD=$POSTGRES_PASSWORD &&
        while true; do
          sleep ${BACKUP_INTERVAL}
          echo 'Создаём бэкап таблицы mlflow...'
          pg_dump -h postgres -U $POSTGRES_USER -d $POSTGRES_DB | gzip > /tmp/mlflow_table.sql.gz &&
          aws --endpoint-url=https://storage.yandexcloud.net s3 cp /tmp/mlflow_table.sql.gz s3://$S3_BUCKET/backups/mlflow_table.sql.gz
          echo 'Бэкап отправлен в S3'
        done
      "
volumes:
  pgdata: